name: Release
on:
  workflow_dispatch:
jobs:
  package:
    uses: ./.github/workflows/reusable-package.yml
    secrets: inherit
  release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Download artifacts
        uses: actions/download-artifact@v3
      - run: |
          tag=$(cat package/tag.txt)
          imagetag=$(cat package/imagetag.txt)
          gh release create "${tag}" --notes "Arch Linux WSL installer based on Docker image tag `archlinux:${imagetag}`" ./package/*.msix ./packages/DistroLauncher-Appx_TemporaryKey.crt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
